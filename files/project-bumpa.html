<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bumpa. — Victory Owoeye</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --white: #f5f2ed; --accent: #e8501a; --accent2: #f0c040;
    --font-display: 'Anton', sans-serif; --font-body: 'Poppins', sans-serif;
    --muted: #888;
  }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; background: rgba(10,10,10,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
  .nav-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 0.05em; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .nav-back { color: var(--muted); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 300; transition: color 0.2s; }
  .nav-back:hover { color: var(--white); }
  .coming-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 3rem; position: relative; overflow: hidden; background: #100c16; }
  .coming-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: var(--font-display); font-size: clamp(80px, 18vw, 280px); color: rgba(255,255,255,0.02); white-space: nowrap; pointer-events: none; user-select: none; }
  .eyebrow { font-size: 0.75rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); font-weight: 300; margin-bottom: 1.5rem; }
  h1 { font-family: var(--font-display); font-size: clamp(72px, 14vw, 180px); line-height: 0.9; letter-spacing: 0.02em; margin-bottom: 2rem; }
  .coming-sub { max-width: 480px; color: rgba(245,242,237,0.45); font-size: 1rem; font-weight: 300; line-height: 1.8; margin-bottom: 3rem; }
  .coming-badge { display: inline-block; border: 1px solid rgba(232,80,26,0.4); padding: 0.65rem 1.5rem; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-weight: 300; }
  .back-link { display: inline-flex; align-items: center; gap: 0.6rem; margin-top: 2.5rem; color: var(--muted); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 300; transition: color 0.2s; }
  .back-link:hover { color: var(--white); }
  footer { background: var(--black); padding: 2.5rem 3rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-top: 1px solid rgba(255,255,255,0.05); }
  .footer-logo { font-family: var(--font-display); font-size: 1.3rem; color: var(--white); text-decoration: none; }
  .footer-logo span { color: var(--accent); }
  footer p { color: var(--muted); font-size: 0.8rem; font-weight: 300; }
  @media (max-width: 600px) { nav { padding: 1rem 1.5rem; } footer { padding: 2rem 1.5rem; } .coming-hero { padding: 2rem 1.5rem; } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">V<span>.</span>O</a>
  <a href="index.html#portfolio" class="nav-back">← All Projects</a>
</nav>
<section class="coming-hero">
  <div class="coming-bg">BUMPA.</div>
  <div class="eyebrow">Case Study · Coming Soon</div>
  <h1>BUMPA.</h1>
  <p class="coming-sub">This case study is currently in progress. Check back soon for the full project breakdown.</p>
  <div class="coming-badge">Coming Soon</div>
  <a href="index.html#portfolio" class="back-link">← Back to all projects</a>
</section>
<footer>
  <a href="index.html" class="footer-logo">VICTORY<span>.</span></a>
  <p>© 2025 Victory Owoeye. All rights reserved.</p>
</footer>
</body>
</html>
